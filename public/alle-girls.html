/* Grid */

.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.gc{overflow:hidden;cursor:pointer;display:block;position:relative;transition:all .2s}.gc:hover{border-color:rgba(200,146,106,.15);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.25)}

.gc-avail-dot{width:4px;height:4px;border-radius:50%;background:var(--grn);box-shadow:0 0 4px var(--grn)}
.gc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}.gc-tag{font-size:.5rem;padding:2px 6px;border-radius:4px;background:var(--acl);color:var(--ac);border:1px solid rgba(200,146,106,.1)}
.gc-noimg{width:100%;aspect-ratio:3/4;background:var(--bg3);display:flex;align-items:center;justify-content:center}.gc-noimg svg{width:32px;height:32px;stroke:var(--tx3);fill:none;stroke-width:1;opacity:.2}
.empty{text-align:center;padding:60px 20px;color:var(--tx3);font-size:.86rem}
footer{padding:40px 0;border-top:1px solid var(--bdr)}.foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}.foot-l{display:flex;gap:16px}.foot-l a{font-size:.72rem;color:var(--tx3)}.foot-18{font-size:.6rem;color:var(--tx3);opacity:.5}
</style>

<body>

<section class="filters"><div class="ctn">
  <h1 style="font-family:var(--fs);font-size:clamp(1.3rem,3vw,1.8rem);font-weight:400;margin-bottom:16px" class="rv">Alle Girls</h1>
  <div class="filters-bar rv d1">
    <input type="text" class="fi fi-search" id="fSearch" placeholder="Name suchen…" oninput="applyFilters()">
    <select class="fi" id="fCity" onchange="applyFilters()"><option value="">Alle Städte</option></select>
    <button class="fi-today" id="fToday" onclick="this.classList.toggle('on');applyFilters()"><span class="fi-today-dot"></span>Heute verfügbar</button>
    <span class="fi-count" id="fCount"></span>
  </div>
  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px" id="tagFilters" class="rv d2"></div>
</div></section>

</div></section>

</div>
<nav class="bnav"><div class="bnav-i"><a href="/alle-girls" class="bna a"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Girls</a><a href="#" class="bna" onclick="document.getElementById('fSearch').focus();return false"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Suche</a><a href="/alle-studios" class="bna"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Studios</a><a href="/admin" class="bna"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Login</a></div></nav>

<script>
const SB='https://undrlwlxcsrayldbxepd.supabase.co/rest/v1/';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuZHJsd2x4Y3NyYXlsZGJ4ZXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5OTkyMDMsImV4cCI6MjA4NjU3NTIwM30.7-U3lFqu5jyrg-CeQwQyJrUmZflC3PqmhytSfRk7KbI';
const GST='https://undrlwlxcsrayldbxepd.supabase.co/storage/v1/object/public/girl-bilder/';
async function q(p){const r=await fetch(SB+p,{headers:{'apikey':KEY}});return r.json();}
const DM=['sonntag','montag','dienstag','mittwoch','donnerstag','freitag','samstag'];
const TK=DM[new Date().getDay()];

var allGirls=[],activeTags=new Set();

function girlCard(g,i){
  var sn=g.studios?g.studios.name:'';var cn=(g.studios&&g.studios.staedte)?g.studios.staedte.name:'';
  var isToday=g[TK];
  var imgH=g.bild_path?'<img class="gc-img" src="'+GST+g.bild_path+'" alt="'+g.name+'" loading="lazy">':'<div class="gc-noimg"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
  var availH=isToday?'<div class="gc-avail"><span class="gc-avail-dot"></span>Heute da</div>':'';
  var tagsH='';if(g.girl_tag_zuordnung&&g.girl_tag_zuordnung.length){tagsH='<div class="gc-tags">';g.girl_tag_zuordnung.slice(0,3).forEach(function(t){if(t.girl_tags)tagsH+='<span class="gc-tag">'+t.girl_tags.name+'</span>';});tagsH+='</div>';}
  return '<a href="/girl.html?id='+g.id+'" class="glass gc rv d'+(i%5+1)+'">'+imgH+'<div class="gc-b"><div class="gc-n">'+g.name+'</div><div class="gc-meta">'+(cn||sn)+'</div>'+availH+tagsH+'</div></a>';
}

function applyFilters(){
  var search=document.getElementById('fSearch').value.toLowerCase();
  var city=document.getElementById('fCity').value;
  var todayOnly=document.getElementById('fToday').classList.contains('on');
  var filtered=allGirls.filter(function(g){
    if(search&&!g.name.toLowerCase().includes(search))return false;
    if(city){var cn=(g.studios&&g.studios.staedte)?g.studios.staedte.name:'';if(cn!==city)return false;}
    if(todayOnly&&!g[TK])return false;
    if(activeTags.size>0){var gTags=(g.girl_tag_zuordnung||[]).map(function(t){return t.girl_tags?t.girl_tags.name:'';});var match=false;activeTags.forEach(function(t){if(gTags.includes(t))match=true;});if(!match)return false;}
    return true;
  });
  // Sort: today available first, then with photo, then rest
  filtered.sort(function(a,b){
    var aT=a[TK]?1:0,bT=b[TK]?1:0;if(bT!==aT)return bT-aT;
    var aP=a.bild_path?1:0,bP=b.bild_path?1:0;return bP-aP;
  });
  document.getElementById('fCount').textContent=filtered.length+' Girls';
  document.getElementById('girlGrid').innerHTML=filtered.length?filtered.map((g,i)=>girlCard(g,i)).join(''):'<div class="empty">Keine Girls gefunden.</div>';
  document.querySelectorAll('.rv:not(.v)').forEach(function(el){new IntersectionObserver(function(e){if(e[0].isIntersecting)el.classList.add('v')},{threshold:.05}).observe(el);});
}

function toggleTagFilter(name,el){
  if(activeTags.has(name)){activeTags.delete(name);el.classList.remove('on');}
  else{activeTags.add(name);el.classList.add('on');}
  applyFilters();
}

async function init(){
  try{
    var [girls,tags]=await Promise.all([
      q('girls?is_active=eq.true&is_approved=eq.true&order=created_at.desc&select=*,studios(id,name,staedte(name)),girl_tag_zuordnung(girl_tags(name,gruppe))'),
      q('girl_tags?is_active=eq.true&order=sort_order')
    ]);
    allGirls=girls||[];
    // Populate city filter
    var cities=new Set();allGirls.forEach(function(g){var cn=(g.studios&&g.studios.staedte)?g.studios.staedte.name:'';if(cn)cities.add(cn);});
    var sel=document.getElementById('fCity');[...cities].sort().forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
    // Populate tag filters (Service + Highlight only)
    var tf=document.getElementById('tagFilters');
    (tags||[]).filter(function(t){return t.gruppe==='Service'||t.gruppe==='Highlight';}).forEach(function(t){
      tf.innerHTML+='<button class="fi-tag" onclick="toggleTagFilter(\''+t.name+'\',this)">'+t.name+'</button>';
    });
    applyFilters();
  }catch(e){document.getElementById('girlGrid').innerHTML='<div class="empty">Fehler: '+e.message+'</div>';}
}
init();
document.querySelectorAll('.rv').forEach(function(el){new IntersectionObserver(function(e){if(e[0].isIntersecting)el.classList.add('v')},{threshold:.08}).observe(el);});
</script>
